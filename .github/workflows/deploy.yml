name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            
            echo "=========================================="
            echo "  开始部署 Chat System"
            echo "=========================================="
            
            cd /opt/chat-system
            
            # 首次 clone 或更新
            if [ ! -d ".git" ]; then
              git clone https://github.com/changhuaqiu/chat-system.git .
            else
              git pull origin main
            fi
            
            # 构建前端
            echo "[1/4] 构建前端..."
            cd frontend
            npm ci
            npm run build
            
            # 复制前端到 Nginx 目录
            echo "[2/4] 部署前端文件..."
            rm -rf /var/www/chat-system/*
            cp -r dist/* /var/www/chat-system/
            
            # 安装后端依赖
            echo "[3/4] 安装后端依赖..."
            cd ../backend
            npm install --production
            
            # 重启后端
            echo "[4/4] 重启后端服务..."
            pm2 delete chat-backend || true
            pm2 start src/server.js --name chat-backend
            pm2 save
            
            echo ""
            echo "=========================================="
            echo "  ✅ 部署完成！"
            echo "=========================================="
            pm2 status

      - name: Health check
        run: |
          sleep 5
          curl -f http://${{ secrets.EC2_HOST }}:3001/api/health || echo "健康检查失败，但部署可能已成功"
