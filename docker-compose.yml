services:
  # OpenClaw Node.js Backend (with embedded Frontend assets)
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    image: openclaw-app:latest
    container_name: openclaw-app
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/chat.db
      - ONE_API_BASE_URL=${ONE_API_BASE_URL} # From .env
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./data:/app/data  # Persist SQLite DB
      - ./logs:/app/logs  # Persist Logs
      - ./uploads:/app/public/uploads # Persist Uploaded Images
    ports:
      - "3000:3000"
    networks:
      - openclaw-net

  # Python Worker (Optional, for heavy tasks)
  worker:
    build: 
      context: ./python-worker
      dockerfile: Dockerfile
    container_name: openclaw-worker
    restart: always
    environment:
      - API_URL=http://app:3000
    networks:
      - openclaw-net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # - ./nginx/certs:/etc/nginx/certs # Uncomment for SSL
    depends_on:
      - app
    networks:
      - openclaw-net

networks:
  openclaw-net:
    driver: bridge
