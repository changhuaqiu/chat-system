services:
  one-api:
    image: justsong/one-api:latest
    container_name: openclaw-one-api
    restart: always
    ports:
      - "3002:3000"
    volumes:
      - ./data/one-api:/data
    environment:
      - TZ=Asia/Shanghai
      # Default root token is '123456' if not set, but better to rely on UI or initial setup.
      # We can set a specific root token for automation if One API supports it via env,
      # but standard way is to get it from UI or logs.
      # For dev simplicity, we'll assume default or user sets it.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

